<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Dil se sorry | Heartfelt Apology</title>
  <style>
    /* ---------- RESET & FULLSCREEN BASE ---------- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;        /* pure full screen — no scroll, no distractions */
      background: #0a0c15;
    }

    body {
      font-family: 'Cormorant Garamond', 'Georgia', 'Times New Roman', serif;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      position: relative;
      background: radial-gradient(circle at 50% 40%, #14182b, #05070f);
    }

    /* ---------- subtle organic grain texture (heartfelt imperfection) ---------- */
    body::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-image: url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIzMDAiIGhlaWdodD0iMzAwIj48ZmlsdGVyIGlkPSJmIj48ZmVUdXJidWxlbmNlIHR5cGU9ImZyYWN0YWxOb2lzZSIgYmFzZUZyZXF1ZW5jeT0iLjUiIG51bU9jdGF2ZXM9IjMiLz48L2ZpbHRlcj48cmVjdCB3aWR0aD0iMTAwJSIgaGVpZ2h0PSIxMDAlIiBmaWx0ZXI9InVybCgjZikiIG9wYWNpdHk9IjAuMDYiLz48L3N2Zz4=');
      background-repeat: repeat;
      opacity: 0.2;
      pointer-events: none;
      z-index: 0;
    }

    /* ---------- main content layer ---------- */
    .apology-container {
      position: relative;
      z-index: 2;
      max-width: 95vw;
      padding: 1rem;
      animation: fadeInGentle 1.4s cubic-bezier(0.2, 0.9, 0.4, 1.1) forwards;
    }

    /* ---------- the HEARTFELT "sorry" ---------- */
    .sorry-text {
      font-size: clamp(4.2rem, 18vw, 14rem);
      font-weight: 550;
      font-style: italic;
      letter-spacing: -0.02em;
      color: #fef1e0;
      text-shadow: 0 0 8px rgba(255, 200, 170, 0.3), 0 8px 25px rgba(0, 0, 0, 0.4), 0 2px 4px rgba(0, 0, 0, 0.3);
      line-height: 1.1;
      margin-bottom: 0.25rem;
      transition: all 0.3s ease;
      animation: gentleHeartbeat 3.8s infinite ease-in-out;
      display: inline-block;
      transform-origin: center;
      cursor: default;
      word-break: keep-all;
    }

    /* emotional underline — appears slowly (sincerity in motion) */
    .sorry-wrapper {
      position: relative;
      display: inline-block;
    }

    .underline-heart {
      display: block;
      width: 0%;
      height: 2.5px;
      background: linear-gradient(90deg, #f3bc9c, #d97a6e, #f3bc9c);
      border-radius: 4px;
      margin: 0.9rem auto 0 auto;
      box-shadow: 0 0 6px rgba(230, 120, 100, 0.4);
      animation: expandSoulLine 1.2s ease-out forwards;
      animation-delay: 0.9s;
    }

    /* ----- heartfelt messages (spoken from the heart) ----- */
    .message-deep {
      margin-top: 2rem;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', 'Montserrat', sans-serif;
      font-size: clamp(0.9rem, 3.5vw, 1.25rem);
      font-weight: 350;
      letter-spacing: 0.3px;
      color: #e7dfd3;
      opacity: 0;
      transform: translateY(14px);
      animation: slideUpFade 0.9s forwards;
      animation-delay: 1s;
      max-width: 550px;
      margin-left: auto;
      margin-right: auto;
      line-height: 1.55;
      backdrop-filter: blur(1px);
    }

    .second-line {
      margin-top: 0.8rem;
      font-size: clamp(0.8rem, 3vw, 1rem);
      font-weight: 330;
      color: #cbc3b4;
      opacity: 0;
      transform: translateY(12px);
      animation: slideUpFade 1s forwards;
      animation-delay: 1.4s;
      font-style: normal;
      letter-spacing: 0.5px;
    }

    /* small humble signature */
    .heart-tag {
      margin-top: 2.5rem;
      font-size: 0.8rem;
      font-family: 'Inter', monospace;
      font-weight: 300;
      color: #b3a48f;
      opacity: 0;
      animation: fadeSlow 2s forwards;
      animation-delay: 2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      letter-spacing: 0.8px;
    }

    .heart-icon {
      display: inline-block;
      font-size: 0.9rem;
      animation: softPulseRed 2s infinite;
    }

    /* ---- animations : pure emotion ---- */
    @keyframes fadeInGentle {
      0% {
        opacity: 0;
        transform: scale(0.98);
      }
      100% {
        opacity: 1;
        transform: scale(1);
      }
    }

    @keyframes gentleHeartbeat {
      0% {
        transform: scale(1);
        text-shadow: 0 0 8px rgba(255, 200, 170, 0.3), 0 8px 20px rgba(0, 0, 0, 0.3);
      }
      50% {
        transform: scale(1.018);
        text-shadow: 0 0 16px rgba(255, 180, 130, 0.5), 0 12px 28px rgba(0, 0, 0, 0.4);
        color: #fff9f0;
      }
      100% {
        transform: scale(1);
        text-shadow: 0 0 8px rgba(255, 200, 170, 0.3), 0 8px 20px rgba(0, 0, 0, 0.3);
      }
    }

    @keyframes expandSoulLine {
      0% {
        width: 0%;
        opacity: 0;
      }
      40% {
        opacity: 0.7;
      }
      100% {
        width: 180px;
        opacity: 1;
      }
    }

    @keyframes slideUpFade {
      0% {
        opacity: 0;
        transform: translateY(18px);
      }
      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeSlow {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }

    @keyframes softPulseRed {
      0% {
        transform: scale(1);
        opacity: 0.7;
      }
      50% {
        transform: scale(1.12);
        opacity: 1;
        text-shadow: 0 0 3px #ffb48a;
      }
      100% {
        transform: scale(1);
        opacity: 0.7;
      }
    }

    /* optional subtle glow on hover (makes it more organic) */
    .sorry-text:hover {
      text-shadow: 0 0 24px rgba(255, 190, 130, 0.6), 0 10px 30px rgba(0, 0, 0, 0.5);
      transition: text-shadow 0.3s ease;
    }

    /* responsive tuning: extra sincerity on mobile */
    @media (max-width: 600px) {
      .underline-heart {
        margin-top: 0.5rem;
      }
      .message-deep {
        margin-top: 1.4rem;
        padding: 0 0.6rem;
      }
      .heart-tag {
        margin-top: 1.8rem;
      }
      @keyframes expandSoulLine {
        100% {
          width: 130px;
        }
      }
    }

    /* for very small screens, keep line length elegant */
    @media (max-width: 420px) {
      .sorry-text {
        font-size: clamp(3.2rem, 14vw, 7rem);
      }
    }

    /* subtle vignette effect - emotional depth */
    body::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: radial-gradient(ellipse at center, transparent 40%, rgba(0, 0, 0, 0.35) 95%);
      pointer-events: none;
      z-index: 1;
    }

    /* gentle floating particles (feelings in air) - minimal & emotional */
    .floating-particle {
      position: absolute;
      background: rgba(245, 200, 170, 0.2);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      animation: floatSoft 12s infinite linear;
    }

    /* small random particle effect - like silent remorse */
    @keyframes floatSoft {
      0% {
        transform: translateY(0vh) translateX(0vw) scale(0.4);
        opacity: 0;
      }
      20% {
        opacity: 0.4;
      }
      80% {
        opacity: 0.25;
      }
      100% {
        transform: translateY(-100vh) translateX(20vw) scale(1);
        opacity: 0;
      }
    }
  </style>
  <!-- elegant serif + clean sans for supporting text -->
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500;1,600&family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500&display=swap" rel="stylesheet">
</head>
<body>

<div class="apology-container">
  <!-- main sorry with heartfelt underline -->
  <div>
    <h1 class="sorry-text">sorry</h1>
    <div class="underline-heart"></div>
  </div>

  <!-- deep emotional text — feels like a real confession -->
  <div class="message-deep">
    I know words are never enough,<br>
    but every letter carries the weight of my regret.
  </div>
  <div class="second-line">
    From the depths of my heart — I truly, deeply mean this.
  </div>
  
  <!-- small vulnerable signature with heart -->
  <div class="heart-tag">
    <span class="heart-icon">❤️‍🩹</span> 
    <span>with all my remorse, i'm sorry</span>
    <span class="heart-icon">🕊️</span>
  </div>
</div>

<!-- generate subtle floating particles to mimic emotional weight & sincerity -->
<script>
  (function createTearsOfRegret() {
    // gentle particle effect — not distracting, just adds atmospheric depth
    const particleCount = 35;
    const bodyEl = document.body;
    
    for (let i = 0; i < particleCount; i++) {
      const particle = document.createElement('div');
      particle.classList.add('floating-particle');
      
      // random size between 2px and 9px
      const size = Math.random() * 7 + 2;
      particle.style.width = size + 'px';
      particle.style.height = size + 'px';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.bottom = '-20px';
      particle.style.opacity = '0';
      particle.style.background = `rgba(235, 180, 140, ${Math.random() * 0.25 + 0.1})`;
      particle.style.filter = 'blur(0.4px)';
      
      // random duration & delay
      const duration = Math.random() * 12 + 7;
      const delay = Math.random() * 15;
      particle.style.animation = `floatSoft ${duration}s infinite linear`;
      particle.style.animationDelay = delay + 's';
      particle.style.animationTimingFunction = 'ease-in-out';
      
      bodyEl.appendChild(particle);
    }
    
    // additional tiny sparkles — like sincere glimmers
    const sparkleCount = 18;
    for (let i = 0; i < sparkleCount; i++) {
      const spark = document.createElement('div');
      spark.classList.add('floating-particle');
      const sizeSpark = Math.random() * 3 + 1.5;
      spark.style.width = sizeSpark + 'px';
      spark.style.height = sizeSpark + 'px';
      spark.style.left = Math.random() * 100 + '%';
      spark.style.top = Math.random() * 80 + '%';
      spark.style.background = `rgba(255, 220, 170, 0.5)`;
      spark.style.filter = 'blur(0.8px)';
      spark.style.animation = `floatSoft ${Math.random() * 16 + 9}s infinite reverse`;
      spark.style.animationDelay = Math.random() * 10 + 's';
      spark.style.opacity = '0.2';
      bodyEl.appendChild(spark);
    }
  })();
</script>

<!-- additional micro-interaction: heartbeat of text on click/tap (optional, increases emotional connect) -->
<script>
  (function addEmotionalTouch() {
    const sorryElem = document.querySelector('.sorry-text');
    if (sorryElem) {
      // making the text interactive so that the user feels the apology responds to them
      sorryElem.addEventListener('click', function(e) {
        e.stopPropagation();
        // small sincere ripple effect
        this.style.transform = 'scale(1.02)';
        this.style.transition = 'transform 0.2s cubic-bezier(0.2, 1.2, 0.8, 1)';
        setTimeout(() => {
          if (this) this.style.transform = '';
        }, 280);
        
        // create a subtle floating heart to emphasize sincerity
        const heartSpan = document.createElement('span');
        heartSpan.innerHTML = '💔';
        heartSpan.style.position = 'fixed';
        heartSpan.style.left = (e.clientX || window.innerWidth/2) + 'px';
        heartSpan.style.top = (e.clientY || window.innerHeight/2) + 'px';
        heartSpan.style.fontSize = '22px';
        heartSpan.style.pointerEvents = 'none';
        heartSpan.style.opacity = '0.8';
        heartSpan.style.transform = 'translate(-50%, -50%)';
        heartSpan.style.transition = 'all 1s ease-out';
        heartSpan.style.zIndex = '999';
        document.body.appendChild(heartSpan);
        setTimeout(() => {
          heartSpan.style.opacity = '0';
          heartSpan.style.transform = 'translate(-50%, -80%) scale(1.6)';
          setTimeout(() => heartSpan.remove(), 1000);
        }, 30);
      });
    }
    
    // optional additional sincere message if user stays long (shows deeper apology)
    let timerShown = false;
    const showExtraRemorse = () => {
      if (timerShown) return;
      timerShown = true;
      const deepMsg = document.createElement('div');
      deepMsg.textContent = '❝ I carry this regret with every breath. Please forgive me. ❞';
      deepMsg.style.position = 'fixed';
      deepMsg.style.bottom = '15px';
      deepMsg.style.left = '0';
      deepMsg.style.right = '0';
      deepMsg.style.textAlign = 'center';
      deepMsg.style.fontFamily = "'Inter', sans-serif";
      deepMsg.style.fontSize = '11px';
      deepMsg.style.fontWeight = '300';
      deepMsg.style.letterSpacing = '0.5px';
      deepMsg.style.color = '#bba98c';
      deepMsg.style.backgroundColor = 'rgba(0,0,0,0.4)';
      deepMsg.style.backdropFilter = 'blur(6px)';
      deepMsg.style.padding = '6px 14px';
      deepMsg.style.width = 'fit-content';
      deepMsg.style.margin = '0 auto';
      deepMsg.style.borderRadius = '40px';
      deepMsg.style.bottom = '20px';
      deepMsg.style.zIndex = '10';
      deepMsg.style.opacity = '0';
      deepMsg.style.transition = 'opacity 1.2s ease';
      document.body.appendChild(deepMsg);
      setTimeout(() => { deepMsg.style.opacity = '0.7'; }, 1800);
      setTimeout(() => { if(deepMsg) deepMsg.style.opacity = '0'; setTimeout(() => deepMsg.remove(), 2000); }, 10000);
    };
    setTimeout(showExtraRemorse, 4800);
  })();
</script>

<!-- style for extra particles container (ensures full screen no overflow) -->
<style>
  .floating-particle {
    position: absolute;
    will-change: transform;
    pointer-events: none;
    user-select: none;
  }
  body {
    overscroll-behavior: none;
  }
  /* ensure fullscreen immersive experience */
  .apology-container {
    width: 100%;
    backdrop-filter: blur(0px);
  }
  /* subtle shimmer to main text while reading */
  @keyframes softGlowText {
    0% { text-shadow: 0 0 5px rgba(255,190,140,0.2); }
    100% { text-shadow: 0 0 12px rgba(255,190,140,0.4); }
  }
  .sorry-text {
    animation: gentleHeartbeat 3.8s infinite ease-in-out, softGlowText 3s alternate infinite;
  }
  /* no scrollbars, absolute full screen purity */
  ::-webkit-scrollbar {
    display: none;
  }
</style>
</body>
</html>
